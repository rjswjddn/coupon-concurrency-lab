# 선착순 버스트 부하는 수십 초 만에 끝난다.
# 기본값 15s로 긁으면 테스트가 끝난 뒤라 데이터 포인트가 3~4개뿐이다.
# → 1s로 촘촘히 긁어야 버스트 동안의 pool/latency 곡선이 보인다.
global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  # host에서 ./gradlew bootRun 으로 도는 Spring 앱
  - job_name: 'coupon-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']

  # MySQL 서버측 지표(threads_running, innodb row lock 등)
  - job_name: 'mysqld'
    static_configs:
      - targets: ['mysqld-exporter:9104']
