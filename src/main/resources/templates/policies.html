<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 정책 · 쿠폰 동시성 랩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('policies')}"></nav>

<main class="container my-5">
    <h3 class="mb-4"><i class="bi bi-ticket-perforated-fill text-success"></i> 쿠폰 정책</h3>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">정책 생성</div>
                <div class="card-body">
                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label">이름</label>
                            <input type="text" class="form-control" id="name" placeholder="선착순 100개 1000원 할인" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">할인 방식</label>
                                <select class="form-select" id="discountType">
                                    <option value="AMOUNT">정액(원)</option>
                                    <option value="RATE">정률(%)</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">할인 값</label>
                                <input type="number" class="form-control" id="discountValue" value="1000" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">선착순 수량(재고)</label>
                            <input type="number" class="form-control" id="totalQuantity" value="100" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">발급 시작</label>
                                <input type="datetime-local" class="form-control" id="issueStartAt" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">발급 종료</label>
                                <input type="datetime-local" class="form-control" id="issueEndAt" required>
                            </div>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="onePerMember" checked>
                            <label class="form-check-label" for="onePerMember">1인 1매</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100">생성</button>
                    </form>
                    <div id="createAlert" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">정책 조회 (발급 현황)</div>
                <div class="card-body">
                    <div class="input-group mb-3">
                        <span class="input-group-text">정책 ID</span>
                        <input type="number" class="form-control" id="lookupId" placeholder="1">
                        <button class="btn btn-outline-secondary" id="lookupBtn">조회</button>
                    </div>
                    <div id="lookupResult"></div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <span>정책 목록</span>
                    <form id="searchForm" class="d-flex gap-2">
                        <select class="form-select form-select-sm" id="statusFilter" style="width:auto;">
                            <option value="ALL">전체</option>
                            <option value="ACTIVE">발급중</option>
                            <option value="UPCOMING">예정</option>
                            <option value="ENDED">종료</option>
                        </select>
                        <input type="search" class="form-control form-control-sm" id="keyword"
                               placeholder="이름 검색" style="width:180px;">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">검색</button>
                    </form>
                </div>
                <div class="card-body p-0" style="overflow-x:auto;">
                    <table class="table table-sm table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-3">ID</th><th>이름</th><th>상태</th><th>할인</th>
                            <th class="text-end">재고(카운터)</th>
                            <th class="text-end">실제 발급 / 총량</th>
                            <th>정합성</th><th>1인1매</th>
                        </tr>
                        </thead>
                        <tbody id="policyRows">
                        <tr><td colspan="8" class="text-center text-muted py-4">불러오는 중…</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <span class="small text-muted" id="pageInfo">-</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="prevBtn">이전</button>
                        <button class="btn btn-outline-secondary" id="nextBtn">다음</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 발급 기간 기본값: 시작=지금, 종료=+7일 (datetime-local 포맷)
    const toLocal = (d) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    const now = new Date();
    document.getElementById('issueStartAt').value = toLocal(now);
    document.getElementById('issueEndAt').value = toLocal(new Date(now.getTime() + 7 * 864e5));

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const box = document.getElementById('createAlert');
        box.innerHTML = '';
        try {
            const res = await fetch('/api/coupon-policies', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    discountType: document.getElementById('discountType').value,
                    discountValue: Number(document.getElementById('discountValue').value),
                    totalQuantity: Number(document.getElementById('totalQuantity').value),
                    issueStartAt: document.getElementById('issueStartAt').value + ':00',
                    issueEndAt: document.getElementById('issueEndAt').value + ':00',
                    onePerMember: document.getElementById('onePerMember').checked
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '생성 실패');
            box.innerHTML = `<div class="alert alert-success py-2 mb-0">생성 완료 · 정책 ID <b>${data.id}</b> (재고 ${data.stockQuantity})</div>`;
            document.getElementById('lookupId').value = data.id;
            loadList(0);
        } catch (err) {
            box.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    });

    // ── 발급 현황 조회: 재고 카운터와 실제 발급 행 수를 나란히 비교 ──
    async function lookup() {
        const id = document.getElementById('lookupId').value;
        const box = document.getElementById('lookupResult');
        if (!id) return;
        try {
            const res = await fetch(`/api/coupon-policies/${id}/issues/stats`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '조회 실패');

            const counterIssued = data.totalQuantity - data.stockQuantity;  // 카운터가 주장하는 발급 수
            const gap = data.issuedCount - counterIssued;                    // 실제와의 차이
            const oversell = data.issuedCount > data.totalQuantity;
            const pct = data.totalQuantity > 0
                ? Math.min(100, data.issuedCount / data.totalQuantity * 100) : 0;

            const badges = [];
            if (oversell) badges.push(`<span class="badge text-bg-danger">OVERSELL · 총량 초과 ${data.issuedCount - data.totalQuantity}건</span>`);
            if (gap !== 0) badges.push(`<span class="badge text-bg-danger">불일치 · 카운터 vs 실제 ${gap > 0 ? '+' : ''}${gap}건</span>`);
            if (data.onePerMember && data.duplicateIssuedCount > 0)
                badges.push(`<span class="badge text-bg-warning text-dark">중복 발급 ${data.duplicateIssuedCount}건</span>`);
            if (badges.length === 0) badges.push('<span class="badge text-bg-success">정합성 OK</span>');

            box.innerHTML = `
                <h5 class="mb-1">${data.policyName}</h5>
                <div class="text-muted small mb-3">1인1매 ${data.onePerMember ? 'Y' : 'N'} · 총량 ${data.totalQuantity}</div>
                <div class="row text-center mb-2">
                    <div class="col"><div class="text-muted small">남은 재고(카운터)</div>
                        <div class="stat-num ${data.stockQuantity < 0 ? 'text-danger' : ''}">${data.stockQuantity}</div></div>
                    <div class="col"><div class="text-muted small">카운터 기준 발급</div>
                        <div class="stat-num">${counterIssued}</div></div>
                    <div class="col"><div class="text-muted small">실제 발급 행 수</div>
                        <div class="stat-num ${gap !== 0 ? 'text-danger' : ''}">${data.issuedCount}</div></div>
                </div>
                <div class="progress mb-2" style="height:8px;">
                    <div class="progress-bar ${oversell ? 'bg-danger' : 'bg-success'}" style="width:${pct}%"></div>
                </div>
                <div class="d-flex gap-1 flex-wrap">${badges.join('')}</div>`;
        } catch (err) {
            box.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    }
    document.getElementById('lookupBtn').addEventListener('click', lookup);

    // ── 정책 목록: 페이징 + 이름 검색 + 발급 기간 상태 필터 ──
    const PAGE_SIZE = 10;
    let page = 0;

    function periodBadge(p) {
        const now = new Date();
        if (now < new Date(p.issueStartAt)) return '<span class="badge text-bg-secondary">예정</span>';
        if (now > new Date(p.issueEndAt)) return '<span class="badge text-bg-light text-muted border">종료</span>';
        return '<span class="badge text-bg-success">발급중</span>';
    }

    function integrityBadge(p) {
        const counterIssued = p.totalQuantity - p.stockQuantity;
        const gap = p.issuedCount - counterIssued;
        const badges = [];
        if (p.issuedCount > p.totalQuantity) badges.push('<span class="badge text-bg-danger">OVERSELL</span>');
        if (gap !== 0) badges.push(`<span class="badge text-bg-danger">불일치 ${gap > 0 ? '+' : ''}${gap}</span>`);
        return badges.length ? badges.join(' ') : '<span class="badge text-bg-success">OK</span>';
    }

    async function loadList(target = page) {
        const rows = document.getElementById('policyRows');
        const keyword = encodeURIComponent(document.getElementById('keyword').value.trim());
        const status = document.getElementById('statusFilter').value;
        try {
            const res = await fetch(`/api/coupon-policies?page=${target}&size=${PAGE_SIZE}&keyword=${keyword}&status=${status}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '목록 조회 실패');

            page = data.page;
            rows.innerHTML = data.content.length === 0
                ? '<tr><td colspan="8" class="text-center text-muted py-4">정책 없음</td></tr>'
                : data.content.map(p => `
                    <tr style="cursor:pointer;" onclick="selectPolicy(${p.id})">
                        <td class="ps-3">${p.id}</td>
                        <td>${p.name}</td>
                        <td>${periodBadge(p)}</td>
                        <td class="small">${p.discountType === 'AMOUNT' ? p.discountValue + '원' : p.discountValue + '%'}</td>
                        <td class="text-end ${p.stockQuantity < 0 ? 'text-danger fw-bold' : ''}">${p.stockQuantity}</td>
                        <td class="text-end">${p.issuedCount} / ${p.totalQuantity}</td>
                        <td>${integrityBadge(p)}</td>
                        <td>${p.onePerMember ? 'Y' : 'N'}</td>
                    </tr>`).join('');

            const totalPages = Math.max(data.totalPages, 1);
            document.getElementById('pageInfo').textContent =
                `${page + 1} / ${totalPages} 페이지 · 총 ${data.totalElements}건`;
            document.getElementById('prevBtn').disabled = page <= 0;
            document.getElementById('nextBtn').disabled = page >= totalPages - 1;
        } catch (err) {
            rows.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">${err.message}</td></tr>`;
        }
    }

    function selectPolicy(id) {
        document.getElementById('lookupId').value = id;
        lookup();
    }

    document.getElementById('searchForm').addEventListener('submit', (e) => { e.preventDefault(); loadList(0); });
    document.getElementById('statusFilter').addEventListener('change', () => loadList(0));
    document.getElementById('prevBtn').addEventListener('click', () => loadList(page - 1));
    document.getElementById('nextBtn').addEventListener('click', () => loadList(page + 1));

    loadList(0);
</script>
</body>
</html>
