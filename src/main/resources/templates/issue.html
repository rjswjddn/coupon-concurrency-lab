<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 발급 · 쿠폰 동시성 랩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('issue')}"></nav>

<main class="container my-5">
    <h3 class="mb-4"><i class="bi bi-send-fill text-danger"></i> 쿠폰 발급</h3>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">발급 요청</div>
                <div class="card-body">
                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label">정책 ID</label>
                            <input type="number" class="form-control" id="policyId" placeholder="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">멤버 ID</label>
                            <input type="number" class="form-control" id="memberId" placeholder="1" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">발급</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="burstBtn">
                                동시 10건 쏘기 (따닥 테스트)
                            </button>
                        </div>
                    </form>
                    <div id="alert" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>재고 모니터</span>
                    <button class="btn btn-sm btn-outline-secondary" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> 새로고침</button>
                </div>
                <div class="card-body">
                    <div id="monitor" class="text-muted">정책 ID를 입력하고 새로고침을 눌러라.</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">최근 발급 로그</div>
                <div class="card-body p-0" style="max-height: 260px; overflow:auto;">
                    <table class="table table-sm mb-0 align-middle">
                        <thead class="table-light"><tr><th class="ps-3">시각</th><th>결과</th><th>내용</th></tr></thead>
                        <tbody id="log"><tr><td colspan="3" class="text-center text-muted py-4">아직 없음</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">정책 선택 <span class="text-muted small fw-normal">(행 클릭 → 정책 ID 입력)</span></div>
                <div class="card-body p-0">
                    <table class="table table-sm table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr><th class="ps-3">ID</th><th>이름</th><th class="text-end">재고</th><th class="text-end pe-3">실제 발급 / 총량</th></tr>
                        </thead>
                        <tbody id="policyRows"><tr><td colspan="4" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <span class="small text-muted" id="policyPageInfo">-</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="policyPrevBtn">이전</button>
                        <button class="btn btn-outline-secondary" id="policyNextBtn">다음</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">멤버 선택 <span class="text-muted small fw-normal">(행 클릭 → 멤버 ID 입력)</span></div>
                <div class="card-body p-0">
                    <table class="table table-sm table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr><th class="ps-3">ID</th><th>이름</th><th>이메일</th></tr>
                        </thead>
                        <tbody id="memberRows"><tr><td colspan="3" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <span class="small text-muted" id="memberPageInfo">-</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="memberPrevBtn">이전</button>
                        <button class="btn btn-outline-secondary" id="memberNextBtn">다음</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const logBody = document.getElementById('log');
    let logFirst = true;

    function addLog(ok, text) {
        if (logFirst) { logBody.innerHTML = ''; logFirst = false; }
        const time = new Date().toLocaleTimeString();
        const badge = ok ? '<span class="badge text-bg-success">성공</span>'
                         : '<span class="badge text-bg-danger">실패</span>';
        logBody.insertAdjacentHTML('afterbegin',
            `<tr><td class="ps-3 small text-muted">${time}</td><td>${badge}</td><td class="small">${text}</td></tr>`);
    }

    async function issueOnce() {
        const policyId = document.getElementById('policyId').value;
        const memberId = document.getElementById('memberId').value;
        const res = await fetch(`/api/coupon-policies/${policyId}/issues`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({memberId: Number(memberId)})
        });
        const data = await res.json();
        if (res.ok) addLog(true, `발급 #${data.issuedCouponId} (member ${data.memberId})`);
        else addLog(false, `${res.status} · ${data.message || '실패'}`);
        return res.ok;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const box = document.getElementById('alert');
        try {
            const ok = await issueOnce();
            box.innerHTML = ok
                ? '<div class="alert alert-success py-2 mb-0">발급 성공</div>'
                : '<div class="alert alert-warning py-2 mb-0">발급 실패 (로그 확인)</div>';
            refresh();
            loadPolicies();
        } catch (err) {
            box.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    });

    // 같은 요청을 동시에 여러 건 발사 — 브라우저에서 레이스를 눈으로 보기 위한 보조 버튼.
    document.getElementById('burstBtn').addEventListener('click', async () => {
        await Promise.all(Array.from({length: 10}, () => issueOnce().catch(() => {})));
        refresh();
        loadPolicies();
    });

    // ── 재고 모니터: 재고 카운터와 실제 발급 행 수를 나란히 비교 ──
    async function refresh() {
        const id = document.getElementById('policyId').value;
        const box = document.getElementById('monitor');
        if (!id) return;
        try {
            const res = await fetch(`/api/coupon-policies/${id}/issues/stats`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '조회 실패');

            const counterIssued = data.totalQuantity - data.stockQuantity;  // 카운터가 주장하는 발급 수
            const gap = data.issuedCount - counterIssued;                    // 실제와의 차이
            const oversell = data.issuedCount > data.totalQuantity;
            const pct = data.totalQuantity > 0
                ? Math.min(100, data.issuedCount / data.totalQuantity * 100) : 0;

            const badges = [];
            if (oversell) badges.push(`<span class="badge text-bg-danger">OVERSELL · 총량 초과 ${data.issuedCount - data.totalQuantity}건</span>`);
            if (gap !== 0) badges.push(`<span class="badge text-bg-danger">불일치 · 카운터 vs 실제 ${gap > 0 ? '+' : ''}${gap}건</span>`);
            if (data.onePerMember && data.duplicateIssuedCount > 0)
                badges.push(`<span class="badge text-bg-warning text-dark">중복 발급 ${data.duplicateIssuedCount}건</span>`);
            if (badges.length === 0) badges.push('<span class="badge text-bg-success">정합성 OK</span>');

            box.innerHTML = `
                <div class="fw-semibold mb-2">${data.policyName}
                    <span class="text-muted small fw-normal">· 총량 ${data.totalQuantity} · 1인1매 ${data.onePerMember ? 'Y' : 'N'}</span></div>
                <div class="row text-center mb-2">
                    <div class="col"><div class="text-muted small">남은 재고(카운터)</div>
                        <div class="stat-num ${data.stockQuantity < 0 ? 'text-danger' : ''}">${data.stockQuantity}</div></div>
                    <div class="col"><div class="text-muted small">카운터 기준 발급</div>
                        <div class="stat-num">${counterIssued}</div></div>
                    <div class="col"><div class="text-muted small">실제 발급 행 수</div>
                        <div class="stat-num ${gap !== 0 ? 'text-danger' : ''}">${data.issuedCount}</div></div>
                </div>
                <div class="progress mb-2" style="height:10px;">
                    <div class="progress-bar ${oversell ? 'bg-danger' : 'bg-success'}" style="width:${pct}%"></div>
                </div>
                <div class="d-flex gap-1 flex-wrap">${badges.join('')}</div>`;
        } catch (err) {
            box.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    }
    document.getElementById('refreshBtn').addEventListener('click', refresh);

    // ── 정책/멤버 선택 목록: 행 클릭으로 발급 폼의 ID를 채운다 ──
    const PAGE_SIZE = 5;
    let policyPage = 0, memberPage = 0;

    async function loadPolicies(target = policyPage) {
        const rows = document.getElementById('policyRows');
        try {
            const res = await fetch(`/api/coupon-policies?page=${target}&size=${PAGE_SIZE}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '목록 조회 실패');

            policyPage = data.page;
            rows.innerHTML = data.content.length === 0
                ? '<tr><td colspan="4" class="text-center text-muted py-4">정책 없음</td></tr>'
                : data.content.map(p => `
                    <tr style="cursor:pointer;" onclick="pickPolicy(${p.id})">
                        <td class="ps-3">${p.id}</td>
                        <td>${p.name}</td>
                        <td class="text-end ${p.stockQuantity < 0 ? 'text-danger fw-bold' : ''}">${p.stockQuantity}</td>
                        <td class="text-end pe-3">${p.issuedCount} / ${p.totalQuantity}</td>
                    </tr>`).join('');

            const totalPages = Math.max(data.totalPages, 1);
            document.getElementById('policyPageInfo').textContent = `${policyPage + 1} / ${totalPages}`;
            document.getElementById('policyPrevBtn').disabled = policyPage <= 0;
            document.getElementById('policyNextBtn').disabled = policyPage >= totalPages - 1;
        } catch (err) {
            rows.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">${err.message}</td></tr>`;
        }
    }

    async function loadMembers(target = memberPage) {
        const rows = document.getElementById('memberRows');
        try {
            const res = await fetch(`/api/members?page=${target}&size=${PAGE_SIZE}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '목록 조회 실패');

            memberPage = data.page;
            rows.innerHTML = data.content.length === 0
                ? '<tr><td colspan="3" class="text-center text-muted py-4">멤버 없음</td></tr>'
                : data.content.map(m => `
                    <tr style="cursor:pointer;" onclick="pickMember(${m.id})">
                        <td class="ps-3">${m.id}</td><td>${m.name}</td><td class="small text-muted">${m.email}</td>
                    </tr>`).join('');

            const totalPages = Math.max(data.totalPages, 1);
            document.getElementById('memberPageInfo').textContent = `${memberPage + 1} / ${totalPages}`;
            document.getElementById('memberPrevBtn').disabled = memberPage <= 0;
            document.getElementById('memberNextBtn').disabled = memberPage >= totalPages - 1;
        } catch (err) {
            rows.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">${err.message}</td></tr>`;
        }
    }

    function pickPolicy(id) {
        document.getElementById('policyId').value = id;
        refresh();
    }

    function pickMember(id) {
        document.getElementById('memberId').value = id;
    }

    document.getElementById('policyPrevBtn').addEventListener('click', () => loadPolicies(policyPage - 1));
    document.getElementById('policyNextBtn').addEventListener('click', () => loadPolicies(policyPage + 1));
    document.getElementById('memberPrevBtn').addEventListener('click', () => loadMembers(memberPage - 1));
    document.getElementById('memberNextBtn').addEventListener('click', () => loadMembers(memberPage + 1));

    loadPolicies(0);
    loadMembers(0);
</script>
</body>
</html>
