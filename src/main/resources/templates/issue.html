<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 발급 · 쿠폰 동시성 랩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('issue')}"></nav>

<main class="container my-5">
    <h3 class="mb-4"><i class="bi bi-send-fill text-danger"></i> 쿠폰 발급</h3>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">발급 요청</div>
                <div class="card-body">
                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label">정책 ID</label>
                            <input type="number" class="form-control" id="policyId" placeholder="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">멤버 ID</label>
                            <input type="number" class="form-control" id="memberId" placeholder="1" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">발급</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="burstBtn">
                                동시 10건 쏘기 (따닥 테스트)
                            </button>
                        </div>
                    </form>
                    <div id="alert" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>재고 모니터</span>
                    <button class="btn btn-sm btn-outline-secondary" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> 새로고침</button>
                </div>
                <div class="card-body">
                    <div id="monitor" class="text-muted">정책 ID를 입력하고 새로고침을 눌러라.</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">최근 발급 로그</div>
                <div class="card-body p-0" style="max-height: 260px; overflow:auto;">
                    <table class="table table-sm mb-0 align-middle">
                        <thead class="table-light"><tr><th class="ps-3">시각</th><th>결과</th><th>내용</th></tr></thead>
                        <tbody id="log"><tr><td colspan="3" class="text-center text-muted py-4">아직 없음</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const logBody = document.getElementById('log');
    let logFirst = true;

    function addLog(ok, text) {
        if (logFirst) { logBody.innerHTML = ''; logFirst = false; }
        const time = new Date().toLocaleTimeString();
        const badge = ok ? '<span class="badge text-bg-success">성공</span>'
                         : '<span class="badge text-bg-danger">실패</span>';
        logBody.insertAdjacentHTML('afterbegin',
            `<tr><td class="ps-3 small text-muted">${time}</td><td>${badge}</td><td class="small">${text}</td></tr>`);
    }

    async function issueOnce() {
        const policyId = document.getElementById('policyId').value;
        const memberId = document.getElementById('memberId').value;
        const res = await fetch(`/api/coupon-policies/${policyId}/issues`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({memberId: Number(memberId)})
        });
        const data = await res.json();
        if (res.ok) addLog(true, `발급 #${data.issuedCouponId} (member ${data.memberId})`);
        else addLog(false, `${res.status} · ${data.message || '실패'}`);
        return res.ok;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const box = document.getElementById('alert');
        try {
            const ok = await issueOnce();
            box.innerHTML = ok
                ? '<div class="alert alert-success py-2 mb-0">발급 성공</div>'
                : '<div class="alert alert-warning py-2 mb-0">발급 실패 (로그 확인)</div>';
            refresh();
        } catch (err) {
            box.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    });

    // 같은 요청을 동시에 여러 건 발사 — 브라우저에서 레이스를 눈으로 보기 위한 보조 버튼.
    document.getElementById('burstBtn').addEventListener('click', async () => {
        await Promise.all(Array.from({length: 10}, () => issueOnce().catch(() => {})));
        refresh();
    });

    async function refresh() {
        const id = document.getElementById('policyId').value;
        const box = document.getElementById('monitor');
        if (!id) return;
        try {
            const res = await fetch('/api/coupon-policies/' + id);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '조회 실패');
            const used = data.totalQuantity - data.stockQuantity;
            const pct = data.totalQuantity > 0 ? Math.min(100, Math.max(0, used / data.totalQuantity * 100)) : 0;
            const oversell = data.stockQuantity < 0;
            box.innerHTML = `
                <div class="d-flex justify-content-between align-items-end">
                    <div><div class="text-muted small">남은 재고</div>
                        <div class="stat-num ${oversell ? 'text-danger' : ''}">${data.stockQuantity}</div></div>
                    <div class="text-end text-muted small">발급 ${used} / 총 ${data.totalQuantity}</div>
                </div>
                <div class="progress mt-2" style="height:10px;">
                    <div class="progress-bar ${oversell ? 'bg-danger' : 'bg-success'}" style="width:${pct}%"></div>
                </div>
                ${oversell ? '<div class="mt-2"><span class="badge text-bg-danger">OVERSELL · 재고가 음수다</span></div>' : ''}`;
        } catch (err) {
            box.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    }
    document.getElementById('refreshBtn').addEventListener('click', refresh);
</script>
</body>
</html>
