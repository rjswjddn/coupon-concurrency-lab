<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멤버 · 쿠폰 동시성 랩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('members')}"></nav>

<main class="container my-5">
    <h3 class="mb-4"><i class="bi bi-people-fill text-primary"></i> 멤버</h3>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">멤버 등록</div>
                <div class="card-body">
                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label">이름</label>
                            <input type="text" class="form-control" id="name" placeholder="홍길동" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">이메일</label>
                            <input type="email" class="form-control" id="email" placeholder="hong@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">등록</button>
                    </form>
                    <div id="alert" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">이번 세션에 등록한 멤버</div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0 align-middle">
                        <thead class="table-light">
                        <tr><th class="ps-3">ID</th><th>이름</th><th>이메일</th></tr>
                        </thead>
                        <tbody id="rows">
                        <tr><td colspan="3" class="text-center text-muted py-4">아직 없음</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const rows = document.getElementById('rows');
    let first = true;

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alert');
        alertBox.innerHTML = '';
        try {
            const res = await fetch('/api/members', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '등록 실패');

            alertBox.innerHTML = `<div class="alert alert-success py-2 mb-0">등록 완료 · ID <b>${data.id}</b></div>`;
            if (first) { rows.innerHTML = ''; first = false; }
            rows.insertAdjacentHTML('afterbegin',
                `<tr><td class="ps-3">${data.id}</td><td>${data.name}</td><td>${data.email}</td></tr>`);
            e.target.reset();
        } catch (err) {
            alertBox.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    });
</script>
</body>
</html>
