<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멤버 · 쿠폰 동시성 랩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('members')}"></nav>

<main class="container my-5">
    <h3 class="mb-4"><i class="bi bi-people-fill text-primary"></i> 멤버</h3>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">멤버 등록</div>
                <div class="card-body">
                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label">이름</label>
                            <input type="text" class="form-control" id="name" placeholder="홍길동" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">이메일</label>
                            <input type="email" class="form-control" id="email" placeholder="hong@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">등록</button>
                    </form>
                    <div id="alert" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>전체 멤버</span>
                    <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">
                        <i class="bi bi-arrow-clockwise"></i> 새로고침
                    </button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0 align-middle">
                        <thead class="table-light">
                        <tr><th class="ps-3">ID</th><th>이름</th><th>이메일</th></tr>
                        </thead>
                        <tbody id="rows">
                        <tr><td colspan="3" class="text-center text-muted py-4">불러오는 중…</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <span class="small text-muted" id="pageInfo">-</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="prevBtn">이전</button>
                        <button class="btn btn-outline-secondary" id="nextBtn">다음</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const rows = document.getElementById('rows');
    const PAGE_SIZE = 10;
    let page = 0;

    async function load(target = page) {
        try {
            const res = await fetch(`/api/members?page=${target}&size=${PAGE_SIZE}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '목록 조회 실패');

            page = data.page;
            rows.innerHTML = data.content.length === 0
                ? '<tr><td colspan="3" class="text-center text-muted py-4">멤버 없음</td></tr>'
                : data.content.map(m =>
                    `<tr><td class="ps-3">${m.id}</td><td>${m.name}</td><td>${m.email}</td></tr>`).join('');

            const totalPages = Math.max(data.totalPages, 1);
            document.getElementById('pageInfo').textContent =
                `${page + 1} / ${totalPages} 페이지 · 총 ${data.totalElements}명`;
            document.getElementById('prevBtn').disabled = page <= 0;
            document.getElementById('nextBtn').disabled = page >= totalPages - 1;
        } catch (err) {
            rows.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">${err.message}</td></tr>`;
        }
    }

    document.getElementById('refreshBtn').addEventListener('click', () => load());
    document.getElementById('prevBtn').addEventListener('click', () => load(page - 1));
    document.getElementById('nextBtn').addEventListener('click', () => load(page + 1));

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alert');
        alertBox.innerHTML = '';
        try {
            const res = await fetch('/api/members', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || '등록 실패');

            alertBox.innerHTML = `<div class="alert alert-success py-2 mb-0">등록 완료 · ID <b>${data.id}</b></div>`;
            e.target.reset();
            load(0); // 최신순 정렬이라 방금 등록한 멤버가 1페이지 맨 위에 온다
        } catch (err) {
            alertBox.innerHTML = `<div class="alert alert-danger py-2 mb-0">${err.message}</div>`;
        }
    });

    load(0);
</script>
</body>
</html>
