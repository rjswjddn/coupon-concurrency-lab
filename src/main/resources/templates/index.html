<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 동시성 랩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar('home')}"></nav>

<main class="container my-5">
    <div class="hero p-5 mb-4">
        <h1 class="mb-2"><i class="bi bi-lightning-charge-fill text-warning"></i> 선착순 쿠폰 발급</h1>
        <p class="mb-0 opacity-75">동시성/성능 문제를 측정→진단→처방→재측정으로 학습하는 실험실.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-people-fill text-primary"></i> 멤버</h5>
                    <p class="text-muted small">발급 주체를 등록한다.</p>
                    <a href="/members" class="btn btn-outline-primary btn-sm">멤버 관리 →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-ticket-perforated-fill text-success"></i> 쿠폰 정책</h5>
                    <p class="text-muted small">할인 규칙과 선착순 수량(재고)을 정의한다.</p>
                    <a href="/policies" class="btn btn-outline-success btn-sm">정책 관리 →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-send-fill text-danger"></i> 쿠폰 발급</h5>
                    <p class="text-muted small">발급을 실행하고 재고 변화를 관측한다.</p>
                    <a href="/issue" class="btn btn-outline-danger btn-sm">발급 화면 →</a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
